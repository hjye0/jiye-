<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 점심 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain"></div>

  <main class="container">

    <div class="badge">LUNCH PICKER</div>

    <h1>
      오늘 점심,<br />
      <span>고민 끝.</span>
    </h1>

    <p class="description">
      망설이지 말고 버튼 위에 마우스를 올려보세요.<br />
      오늘의 메뉴가 당신을 기다리고 있습니다.
    </p>

    <div class="menu-box" id="menuBox">

      <div class="ripple"></div>
      <div class="ripple ripple2"></div>

      <button id="recommendBtn">
        메뉴 추천 받기
      </button>

      <div class="hover-text" id="hoverText">
        오늘은 따뜻한 국밥 어때요?
      </div>

      <div class="food-result" id="foodResult"></div>

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
